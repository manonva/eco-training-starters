env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

name: Responsible CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    name: Code quality with SonarQube
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm install
      - run: npm run build --if-present
      - run: npm test --if-present

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  eco-budget:
    name: Eco/performance budget
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm install

      - name: Prepare report folders
        run: |
          mkdir -p .lighthouseci
          mkdir -p greenit-output
          mkdir -p reports/lighthouse

      - name: Start Vite app
        run: |
          npm run dev -- --host 0.0.0.0 > app.log 2>&1 &
          npx wait-on http://localhost:5173/

      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli

          {
            echo "Running Lighthouse collect..."
            lhci collect

            echo "Running Lighthouse assert..."
            lhci assert

            echo "Running Lighthouse upload..."
            lhci upload
          } 2>&1 | tee .lighthouseci/lighthouse-errors.log || true

      - name: Rename Lighthouse reports
        if: always()
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const manifestPath = '.lighthouseci/manifest.json';
          const outputDir = 'reports/lighthouse';

          fs.mkdirSync(outputDir, { recursive: true });

          if (!fs.existsSync(manifestPath)) {
            fs.writeFileSync(
              path.join(outputDir, 'lighthouse-error.txt'),
              'Aucun rapport Lighthouse HTML généré. Voir lighthouse-errors.log.'
            );
            process.exit(0);
          }

          const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));

          const slugify = (url) => {
            if (url.endsWith('/products/product-1')) return 'page-produit';
            if (url.endsWith('/products')) return 'catalogue';
            return 'accueil';
          };

          const counters = {};

          for (const item of manifest) {
            const slug = slugify(item.url);
            counters[slug] = (counters[slug] || 0) + 1;

            if (item.htmlPath && fs.existsSync(item.htmlPath)) {
              fs.copyFileSync(
                item.htmlPath,
                path.join(outputDir, `${slug}-run-${counters[slug]}.html`)
              );
            }

            if (item.jsonPath && fs.existsSync(item.jsonPath)) {
              fs.copyFileSync(
                item.jsonPath,
                path.join(outputDir, `${slug}-run-${counters[slug]}.json`)
              );
            }
          }
          NODE

      - name: Add Lighthouse errors to summary
        if: always()
        run: |
          echo "## Lighthouse CI" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -s ".lighthouseci/lighthouse-errors.log" ]; then
            echo "### Erreurs / alertes remontées" >> $GITHUB_STEP_SUMMARY
            echo '```text' >> $GITHUB_STEP_SUMMARY
            grep -Ei "error|failed|warning|assertion|not met|expected|actual" .lighthouseci/lighthouse-errors.log | tail -n 40 >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "Aucune erreur Lighthouse remontée." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Rapports HTML générés dans l'artefact : \`lighthouse-report\`." >> $GITHUB_STEP_SUMMARY

      - name: Upload Lighthouse report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-report
          path: |
            .lighthouseci/
            reports/lighthouse/
          include-hidden-files: true
          if-no-files-found: warn

      - name: Run GreenIT Analysis
        run: |
          {
            docker run --rm --network host \
              -v ${{ github.workspace }}/greenit:/app/input \
              -v ${{ github.workspace }}/greenit-output:/app/output \
              jpreisner/greenit-analysis-cli:latest \
              greenit analyse /app/input/urls.yaml /app/output/greenit-report.html --format=html --ci
          } 2>&1 | tee greenit-output/greenit-errors.log || true

      - name: Add GreenIT errors to summary
        if: always()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## GreenIT / EcoIndex" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -s "greenit-output/greenit-errors.log" ]; then
            echo "### Erreurs / alertes remontées" >> $GITHUB_STEP_SUMMARY
            echo '```text' >> $GITHUB_STEP_SUMMARY
            grep -Ei "error|failed|warning|cannot|not found|exception|unable|docker" greenit-output/greenit-errors.log | tail -n 40 >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "Aucune erreur GreenIT remontée." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload GreenIT report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: greenit-report
          path: greenit-output/
          if-no-files-found: warn
