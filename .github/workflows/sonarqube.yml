      - name: Run GreenIT Analysis
        if: always()
        run: |
          cp greenit/urls.yml artifacts/greenit/input/url.yaml
          chmod -R a+rwX artifacts/greenit

          git clone --depth 1 https://github.com/cnumr/GreenIT-Analysis-cli.git /tmp/GreenIT-Analysis-cli

          docker build -t greenit-analysis-cli /tmp/GreenIT-Analysis-cli

          CHROME_PATH="$(which google-chrome || which google-chrome-stable || which chromium || which chromium-browser)"

          echo "Chrome path on runner: $CHROME_PATH"

          docker run --init --rm --cap-add=SYS_ADMIN --network host \
            -v "$PWD/artifacts/greenit/input:/app/input:ro" \
            -v "$PWD/artifacts/greenit/output:/app/output" \
            -v "$CHROME_PATH:/usr/bin/google-chrome:ro" \
            -e TZ=Europe/Paris \
            -e PUPPETEER_EXECUTABLE_PATH=/usr/bin/google-chrome \
            --name GreenIT-Analysis \
            greenit-analysis-cli \
            greenit analyse /app/input/url.yaml /app/output/report.html --format html --max_tab=1 --timeout=60000 --retry=1 --headless true --language fr \
            > artifacts/greenit/greenit.log 2>&1 || true

      - name: GreenIT summary
        if: always()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## GreenIT / EcoIndex" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if grep -qiE "error|failed|exception|warning|cannot|not found|EACCES|ENOENT" artifacts/greenit/greenit.log; then
            echo "### Erreurs détectées" >> $GITHUB_STEP_SUMMARY
            echo '```text' >> $GITHUB_STEP_SUMMARY
            grep -iE "error|failed|exception|warning|cannot|not found|EACCES|ENOENT" artifacts/greenit/greenit.log | tail -30 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "Aucune erreur GreenIT détectée." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Rapport disponible dans l’artefact \`greenit-report\`." >> $GITHUB_STEP_SUMMARY

      - name: Upload GreenIT report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: greenit-report
          path: artifacts/greenit/
          if-no-files-found: warn