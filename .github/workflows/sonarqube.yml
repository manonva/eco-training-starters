env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

name: Responsible CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    name: Code quality with SonarQube
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm install
      - run: npm run build --if-present
      - run: npm test --if-present

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  eco-budget:
    name: Eco/performance budget
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm install

      - name: Prepare report folders
        run: |
          mkdir -p .lighthouseci
          mkdir -p greenit-output

      - name: Start Vite app
        run: |
          npm run dev -- --host 0.0.0.0 > app.log 2>&1 &
          npx wait-on http://localhost:5173/

      ##################################################
      # LIGHTHOUSE
      ##################################################

      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli

          lhci autorun > .lighthouseci/lighthouse.log 2>&1 || true

      - name: Debug Lighthouse
        if: always()
        run: |
          echo "=== CONTENU .lighthouseci ==="
          ls -la .lighthouseci || true

      - name: Lighthouse summary
        if: always()
        run: |
          echo "## Lighthouse CI" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if grep -qiE "error|failed|assertion" .lighthouseci/lighthouse.log; then
            echo "### Erreurs détectées" >> $GITHUB_STEP_SUMMARY
            echo '```text' >> $GITHUB_STEP_SUMMARY
            grep -iE "error|failed|assertion" .lighthouseci/lighthouse.log | tail -20 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "Aucune erreur Lighthouse détectée." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Lighthouse report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-report
          path: .lighthouseci/
          include-hidden-files: true
          if-no-files-found: warn

      ##################################################
      # GREEN IT
      ##################################################

      - name: Run GreenIT Analysis
        run: |
          mkdir -p greenit-output
          chmod -R 777 greenit-output
          docker run --rm --network host \
            -v ${{ github.workspace }}/greenit:/app/input \
            -v ${{ github.workspace }}/greenit-output:/app/output \
            jpreisner/greenit-analysis-cli:latest \
            greenit analyse /app/input/urls.yml /app/output/greenit-report.html --format=html --ci \
            > greenit-output/greenit.log 2>&1 || true
          chmod -R 755 greenit-output

      - name: Debug GreenIT
        if: always()
        run: |
          echo "=== CONTENU greenit-output ==="
          ls -la greenit-output || true

      - name: GreenIT summary
        if: always()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## GreenIT / EcoIndex" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if grep -qiE "error|failed|exception|warning|cannot|not found" greenit-output/greenit.log; then
            echo "### Erreurs détectées" >> $GITHUB_STEP_SUMMARY
            echo '```text' >> $GITHUB_STEP_SUMMARY
            grep -iE "error|failed|exception|warning|cannot|not found" greenit-output/greenit.log | tail -20 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "Aucune erreur GreenIT détectée." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload GreenIT report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: greenit-report
          path: greenit-output/
          if-no-files-found: warn