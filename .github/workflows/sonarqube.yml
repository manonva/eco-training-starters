env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

name: Responsible CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    name: Code quality with SonarQube
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm install
      - run: npm run build --if-present
      - run: npm test --if-present

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  eco-budget:
    name: Eco/performance budget
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm install

      - name: Prepare folders
        run: |
          mkdir -p lighthouseci
          mkdir -p reports/lighthouse
          mkdir -p artifacts/greenit/input
          mkdir -p artifacts/greenit/output

      - name: Start Vite app
        run: |
          npm run dev -- --host 0.0.0.0 > app.log 2>&1 &
          npx wait-on http://localhost:5173/

      - name: Prepare folders
        run: |
          mkdir -p lighthouse-report
          mkdir -p artifacts/greenit/input
          mkdir -p artifacts/greenit/output

      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli

          lhci autorun > lighthouse-report/lighthouse.log 2>&1 || true

          echo "=== Recherche des rapports Lighthouse ===" >> lighthouse-report/lighthouse.log
          find . -name "*.html" >> lighthouse-report/lighthouse.log || true
          find . -name "*.json" >> lighthouse-report/lighthouse.log || true

          find . -name "*.report.html" -exec cp {} lighthouse-report/ \; || true
          find . -name "*.report.json" -exec cp {} lighthouse-report/ \; || true

          touch lighthouse-report/.keep

      - name: Copy Lighthouse reports
        if: always()
        run: |
          find . -name "*.report.html" -exec cp {} lighthouse-report/ \; || true
          find . -name "*.report.json" -exec cp {} lighthouse-report/ \; || true
          
      - name: Rename Lighthouse reports
        if: always()
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const manifestPath = '.lighthouseci/manifest.json';
          const out = 'reports/lighthouse';
          fs.mkdirSync(out, { recursive: true });

          if (!fs.existsSync(manifestPath)) process.exit(0);

          const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));

          const slug = (url) => {
            if (url.endsWith('/products/product-1')) return 'page-produit';
            if (url.endsWith('/products')) return 'catalogue';
            return 'accueil';
          };

          const counters = {};

          for (const item of manifest) {
            const name = slug(item.url);
            counters[name] = (counters[name] || 0) + 1;

            if (item.htmlPath && fs.existsSync(item.htmlPath)) {
              fs.copyFileSync(item.htmlPath, path.join(out, `${name}-run-${counters[name]}.html`));
            }

            if (item.jsonPath && fs.existsSync(item.jsonPath)) {
              fs.copyFileSync(item.jsonPath, path.join(out, `${name}-run-${counters[name]}.json`));
            }
          }
          NODE

      - name: Lighthouse summary
        if: always()
        run: |
          echo "## Lighthouse CI" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          for file in lighthouse-report/*.report.json
          do
            [ -f "$file" ] || continue

            URL=$(jq -r '.finalDisplayedUrl' "$file")
            PERF=$(jq '.categories.performance.score * 100' "$file")
            ACCESS=$(jq '.categories.accessibility.score * 100' "$file")
            BP=$(jq '.categories["best-practices"].score * 100' "$file")
            SEO=$(jq '.categories.seo.score * 100' "$file")

            echo "### $URL" >> $GITHUB_STEP_SUMMARY
            echo "- Performance : ${PERF%.*}" >> $GITHUB_STEP_SUMMARY
            echo "- Accessibilité : ${ACCESS%.*}" >> $GITHUB_STEP_SUMMARY
            echo "- Bonnes pratiques : ${BP%.*}" >> $GITHUB_STEP_SUMMARY
            echo "- SEO : ${SEO%.*}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          done

          echo "En savoir plus : artefact \`lighthouse-report\`." >> $GITHUB_STEP_SUMMARY

      - name: Upload Lighthouse report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-report
          path: lighthouse-report/
          if-no-files-found: warn

      - name: Run GreenIT Analysis
        if: always()
        run: |
          cp greenit/urls.yml artifacts/greenit/input/url.yaml
          chmod -R a+rwX artifacts/greenit

          git clone --depth 1 https://github.com/cnumr/GreenIT-Analysis-cli.git /tmp/GreenIT-Analysis-cli

          docker build -t greenit-analysis-cli /tmp/GreenIT-Analysis-cli

          CHROME_PATH="$(which google-chrome || which google-chrome-stable || which chromium || which chromium-browser)"

          echo "Chrome path on runner: $CHROME_PATH"

          docker run --init --rm --cap-add=SYS_ADMIN --network host \
            -v "$PWD/artifacts/greenit/input:/app/input:ro" \
            -v "$PWD/artifacts/greenit/output:/app/output" \
            -v "$CHROME_PATH:/usr/bin/google-chrome:ro" \
            -e TZ=Europe/Paris \
            -e PUPPETEER_EXECUTABLE_PATH=/usr/bin/google-chrome \
            --name GreenIT-Analysis \
            greenit-analysis-cli \
            greenit analyse /app/input/url.yaml /app/output/report.html --format html --max_tab=1 --timeout=60000 --retry=1 --headless true --language fr \
            > artifacts/greenit/greenit.log 2>&1 || true

      - name: GreenIT summary
        if: always()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## GreenIT / EcoIndex" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Rapport généré avec succès." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "En savoir plus : artefact \`greenit-report\`." >> $GITHUB_STEP_SUMMARY

      - name: Upload GreenIT report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: greenit-report
          path: artifacts/greenit/
          if-no-files-found: warn