env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

name: Responsible CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    name: Code quality with SonarQube
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm install
      - run: npm run build --if-present
      - run: npm test --if-present

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  eco-budget:
    name: Eco/performance budget
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm install

      - name: Prepare report folders
        run: |
          mkdir -p .lighthouseci
          mkdir -p greenit-output
          ls -la

      - name: Start Vite app
        run: |
          npm run dev -- --host 0.0.0.0 > app.log 2>&1 &
          npx wait-on http://localhost:5173/

      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli
          lhci collect
          lhci assert || true
          lhci upload || true

      - name: Debug Lighthouse output
        if: always()
        run: |
          echo "Contenu .lighthouseci:"
          ls -la .lighthouseci || true

      - name: Add Lighthouse links to summary
        if: always()
        run: |
          echo "## Lighthouse CI" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f ".lighthouseci/manifest.json" ]; then
            node -e "
              const fs = require('fs');
              const manifest = JSON.parse(fs.readFileSync('.lighthouseci/manifest.json', 'utf8'));

              for (const r of manifest) {
                const reportUrl = r.reportUrl || '';
                console.log('- [' + r.url + '](' + reportUrl + ')');
                console.log('  - Performance: ' + Math.round((r.summary.performance || 0) * 100));
                console.log('  - Accessibilité: ' + Math.round((r.summary.accessibility || 0) * 100));
                console.log('  - Bonnes pratiques: ' + Math.round((r.summary[\"best-practices\"] || 0) * 100));
                console.log('  - SEO: ' + Math.round((r.summary.seo || 0) * 100));
                console.log('');
              }
            " >> $GITHUB_STEP_SUMMARY
          else
            echo "Aucun manifest Lighthouse généré." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Lighthouse report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-report
          path: .lighthouseci/
          include-hidden-files: true
          if-no-files-found: warn

      - name: Run GreenIT Analysis
        run: |
          docker run --rm --network host \
            -v ${{ github.workspace }}/greenit:/app/input \
            -v ${{ github.workspace }}/greenit-output:/app/output \
            jpreisner/greenit-analysis-cli:latest \
            greenit analyse /app/input/urls.yaml /app/output/greenit-report.html --format=html --ci || true

      - name: Debug GreenIT output
        if: always()
        run: |
          echo "Contenu greenit-output:"
          ls -la greenit-output || true

      - name: Add GreenIT link to summary
        if: always()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## GreenIT / EcoIndex" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Rapport disponible dans les artefacts du run GitHub Actions." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[Voir les artefacts du run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY

      - name: Upload GreenIT report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: greenit-report
          path: greenit-output/
          if-no-files-found: warn